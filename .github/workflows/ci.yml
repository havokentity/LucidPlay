name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU-only torch
        # Hosted runners have no GPU; the CPU wheel is small and fast.
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.2"

      - name: Install runtime deps
        run: pip install -r requirements.txt

      - name: Install dev deps
        run: pip install -e ".[dev]"

      - name: Show env
        run: |
          python -V
          python -c "import torch; print('torch', torch.__version__, 'cuda?', torch.cuda.is_available())"
          python -c "import pygame; print('pygame', pygame.version.ver)"

      - name: Run tests
        env:
          SDL_VIDEODRIVER: dummy
          PYGAME_HIDE_SUPPORT_PROMPT: "1"
        run: pytest -q
